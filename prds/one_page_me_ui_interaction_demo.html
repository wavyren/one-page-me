function addMsg(role,text){
  var c=document.getElementById('msgs'),d=document.createElement('div');
  d.className='msg-in';
  if(role==='ai'){
    d.innerHTML='<div style="display:flex;gap:7px;align-items:flex-start;">'
      +'<div style="width:22px;height:22px;border-radius:50%;background:#C9854A;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:white;font-size:9px;margin-top:2px;">小页</div>'
      +'<div style="background:var(--color-background-secondary);border-radius:0 10px 10px 10px;padding:9px 11px;font-size:13px;line-height:1.6;max-width:87%;white-space:pre-wrap;color:var(--color-text-primary);">'+text+'</div></div>';
  } else {
    d.innerHTML='<div style="display:flex;justify-content:flex-end;">'
      +'<div style="background:#C9854A;color:white;border-radius:10px 0 10px 10px;padding:9px 11px;font-size:13px;line-height:1.6;max-width:87%;">'+text+'</div></div>';
  }
  c.appendChild(d);c.scrollTop=c.scrollHeight;
}

function showTyping(){
  var c=document.getElementById('msgs'),d=document.createElement('div');
  d.id='typ';
  d.innerHTML='<div style="display:flex;gap:7px;align-items:center;">'
    +'<div style="width:22px;height:22px;border-radius:50%;background:#C9854A;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:white;font-size:9px;">小页</div>'
    +'<div style="background:var(--color-background-secondary);border-radius:0 10px 10px 10px;padding:10px 14px;">'
    +'<span class="dot"></span><span class="dot dot2"></span><span class="dot dot3"></span>'
    +'</div></div>';
  c.appendChild(d);c.scrollTop=c.scrollHeight;
}
function rmTyping(){var t=document.getElementById('typ');if(t)t.remove();}

function addFtag(f){
  var bar=document.getElementById('fbar'),s=document.createElement('span');
  s.className='ftag';
  s.style.cssText='background:'+f.bg+';color:'+f.tc+';';
  s.textContent='✓ '+f.label;
  bar.appendChild(s);
}

function setPips(n){
  var p=document.getElementById('pips');
  p.innerHTML='';
  for(var i=0;i<5;i++){
    var d=document.createElement('div');
    d.className='prog-pip'+(i<n?' done':'');
    p.appendChild(d);
  }
}

function go(){
  if(busy||step>=STEPS.length)return;
  var s=STEPS[step];
  var inp=document.getElementById('ci');
  var utxt=inp.value.trim()||(s.user||'');
  inp.value='';
  if(utxt)addMsg('user',utxt);
  busy=true;
  document.getElementById('sbtn').style.opacity='0.45';
  showTyping();
  setTimeout(function(){
    rmTyping();
    addMsg('ai',s.ai);
    if(s.field)addFtag(s.field);
    document.getElementById('prev').innerHTML=PREVS[s.prev];
    setPips(s.prev);
    if(s.done){
      document.getElementById('gbtn').style.display='block';
      document.getElementById('edit-btn').style.display='block';
    }
    var nh=STEPS[step+1]?STEPS[step+1].hint||'':'';
    document.getElementById('hint-txt').textContent=nh;
    step++;
    busy=false;
    if(step>=STEPS.length){
      document.getElementById('sbtn').style.opacity='0.3';
      document.getElementById('sbtn').style.pointerEvents='none';
    } else {
      document.getElementById('sbtn').style.opacity='1';
    }
  },750+Math.floor(Math.random()*350));
}

// Init
(function(){
  document.getElementById('prev').innerHTML=PREVS[0];
  setPips(0);
  busy=true;
  setTimeout(function(){
    addMsg('ai',STEPS[0].ai);
    document.getElementById('hint-txt').textContent=STEPS[1].hint||'';
    step=1;busy=false;
  },500);
})();
</script>
